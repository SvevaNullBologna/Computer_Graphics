<!DOCTYPE html>
<html>
    <head>
        <style>
            #mycanvas{
                padding: 0px;
                margin: 20px;
                background: #f7ffe3;
                border: thin inset #0000ff;
            }
        </style>
    </head>
    <body onLoad=initialise()>
        <canvas id="mycanvas" width="500" height="500"> 
            canvas non supportato
        </canvas>

        <input type="button" value="TRASLA" onclick="traslate()">
        <input type="button" value="RUOTA" onclick="rotate()">
        <input type="button" value="SCALA" onclick="scale()">
        <input type="button" value="PANNING" onclick="panning()">

        <script src="compute_bezier.js"></script>
        <script src="control_points.js"></script>
        <script src="geometrical_transformation.js"></script>
        <script>
            var mycanvas, context ; 
            var fxt = [], fyt = []; 
            var max_points = 4; 
            var moving_index = -1 
            enable_move_point = false 
            is_panning = false 

            function initialise(){
                mycanvas = document.getElementById("mycanvas")
                context = mycanvas.getContext('2d')

                var canvas_coord = mycanvas.getBoundingClientRect();
      
                mycanvas.onmousedown = function(e) {
                    var click_x = e.clientX - canvas_coord.left
                    var click_y = e.clientY -  canvas_coord.top

                    if(is_panning){
                        moving_index = -2 
                        start_mouse_x = click_x
                        start_mouse_y = click_y                
                    }
                    //disegna un quadratino centrato sul punto (per puro feedback )
                    else if(fxt.length < max_points){
                        fxt.push(click_x)  //cordinate viewport
                        fyt.push(click_y) //coordinate viewport
                        draw_point(click_x, click_y)

                        if(fxt.length === max_points){
                            draw_curve(fxt, fyt)
                            enable_move_point = true 
                        }
                    }
                    else if(enable_move_point){
                        moving_index = is_overing_on_point(click_x, click_y, fxt, fyt, max_points)
                    }  
                    
                }

                mycanvas.onmousemove = function(e){
                    var mouse_x = e.clientX - canvas_coord.left
                    var mouse_y = e.clientY -  canvas_coord.top
                    
                    if(moving_index === -2){
                        var dx = mouse_x - start_mouse_x;
                        var dy = mouse_y - start_mouse_y;

                        traslateCurve(fxt, fyt, dx, dy);

                        start_mouse_x = mouse_x;
                        start_mouse_y = mouse_y; 

                        refresh_scene(context, mycanvas, fxt, fyt)
                    }
                    else if(moving_index != -1){
                        
                        fxt[moving_index] = mouse_x
                        fyt[moving_index] = mouse_y

                        refresh_scene(context, mycanvas, fxt, fyt)
                        
                    }
                }
                mycanvas.onmouseup = function(e){
                        moving_index = -1 
                }
                            
            }

            function traslate(){
                traslateCurve(fxt, fyt, 20, 20)
                refresh_scene(context, mycanvas, fxt, fyt)
            }

            function rotate(){
                rotateCurve(fxt, fyt)
                refresh_scene(context, mycanvas, fxt, fyt)
            }

            function scale(){
                scaleCurve(fxt, fyt)
                refresh_scene(context, mycanvas, fxt, fyt)
            }

            function panning(){
                is_panning = !is_panning
                if(is_panning){
                    mycanvas.style.cursor = "move"
                } 
                else{
                    mycanvas.style.cursor = "default"
                }
            }
             
        </script>
    </body>
</html>
